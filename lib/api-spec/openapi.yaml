  /admin/backup:
    post:
      operationId: generateBackup
      tags: [admin]
      summary: Generate a database backup (admin only)
      description: Runs pg_dump, compresses with gzip and streams the file for download. Registers a record in backup_logs.
      responses:
        "200":
          description: Backup file streamed as application/gzip attachment
          content:
            application/gzip:
              schema:
                type: string
                format: binary
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden — admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: pg_dump failed or not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/backup/logs:
    get:
      operationId: listBackupLogs
