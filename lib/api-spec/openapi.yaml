components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LoginInput:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1

    AuthUser:
      type: object
      required:
        - id
        - name
        - email
        - role
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, manager, employee]

    SuccessResponse:
      type: object
      required:
        - ok
      properties:
        ok:
          type: boolean

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string

    FinancialEntry:
      type: object
      required:
        - id
        - description
        - type
        - amount
        - dueDate
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        description:
          type: string
        type:
          type: string
          enum: [income, expense]
        category:
          type: string
          nullable: true
        amount:
          type: string
        dueDate:
          type: string
          format: date-time
        paidAt:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [pending, paid, overdue, cancelled]
        referenceId:
          type: string
          nullable: true
        referenceType:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    FinancialEntryInput:
      type: object
      required:
        - description
        - type
        - amount
        - dueDate
        - status
      properties:
        description:
          type: string
        type:
          type: string
          enum: [income, expense]
        category:
          type: string
          nullable: true
        amount:
          type: string
        dueDate:
          type: string
          format: date-time
        status:
          type: string
          enum: [pending, paid, overdue, cancelled]
        notes:
